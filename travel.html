<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>One Place — Travel (Prototype)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="greeting">
        <div>
          <div class="hello">My Bus — Jamie ❤️</div>
          <div class="date">Maple Road → School</div>
        </div>
        <div class="avatar">🚌</div>
      </div>
    </header>

    <main>
      <section class="bus-card card">
        <h2>Bus 247</h2>
        <div class="when">Next Bus: <strong>8:12 AM</strong></div>
        <div class="status">On time</div>
        <div class="map-placeholder">[Map placeholder]</div>
      </section>

      <section class="tips card">
        <h3>Travel tips</h3>
        <div>Leave home 10 minutes before bus time</div>
        <div>Check seat number if reserved</div>
      </section>
    </main>

    <nav class="bottom-nav">
      <a class="nav-item" href="index.html">Today</a>
      <a class="nav-item" href="myweek.html">My Week</a>
      <a class="nav-item" href="index.html">School</a>
      <button class="nav-item active">Travel</button>
      <a class="nav-item" href="helpme.html">Help</a>
    </nav>
  </div>
</body>
</html>

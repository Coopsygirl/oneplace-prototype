<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>One Place — My Week (Prototype)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="greeting">
        <div>
          <div class="hello">My Week — Jamie ❤️</div>
          <div class="date">13 - 19 May</div>
        </div>
        <div class="avatar">👧</div>
      </div>
    </header>

    <main>
      <section class="week-card card">
        <h2>Week overview</h2>
        <div class="week-grid">
          <div class="day"><strong>Mon</strong><div class="day-events">School<br/>Football</div></div>
          <div class="day"><strong>Tue</strong><div class="day-events">School<br/>Art Club</div></div>
          <div class="day"><strong>Wed</strong><div class="day-events">School<br/>Swimming</div></div>
          <div class="day"><strong>Thu</strong><div class="day-events">School<br/>Homework</div></div>
          <div class="day"><strong>Fri</strong><div class="day-events">School<br/>Family time</div></div>
          <div class="day"><strong>Sat</strong><div class="day-events">Free</div></div>
          <div class="day"><strong>Sun</strong><div class="day-events">No plans</div></div>
        </div>
      </section>

      <section class="details card">
        <h3>Day details (Tue)</h3>
        <div class="event"><div class="time">8:00 AM</div><div class="meta">Bus 247 → Maple Road</div></div>
        <div class="event"><div class="time">9:00 AM</div><div class="meta">School</div></div>
        <div class="event"><div class="time">4:00 PM</div><div class="meta">Swimming</div></div>
      </section>

    </main>

    <nav class="bottom-nav">
      <a class="nav-item" href="index.html">Today</a>
      <button class="nav-item active">My Week</button>
      <a class="nav-item" href="index.html">School</a>
      <a class="nav-item" href="travel.html">Travel</a>
      <a class="nav-item" href="helpme.html">Help</a>
    </nav>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>One Place — Today (Prototype)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="greeting">
        <div>
          <div class="hello">Good morning, <span id="childName">Jamie</span> ❤️</div>
          <div class="date" id="dateLine"></div>
        </div>
        <div class="avatar">👧</div>
      </div>
    </header>

    <main>
      <section class="now-card card">
        <h2>Now</h2>
        <div class="now-title">Get ready for school</div>
        <ul class="micro-tasks" id="microTasks">
          <li><label><input type="checkbox" data-task="brush"/> Brush teeth</label></li>
          <li><label><input type="checkbox" data-task="dress"/> Get dressed</label></li>
          <li><label><input type="checkbox" data-task="pack"/> Pack your bag</label></li>
        </ul>
      </section>

      <section class="next-card card">
        <h3>Next</h3>
        <div class="transport">
          <div class="bus-info">
            <div class="route">Bus 247</div>
            <div class="when">8:12 AM • Maple Road → School</div>
          </div>
          <div class="eta" id="eta">Leave home in 14 minutes</div>
        </div>
        <button id="viewTimetable" class="link-btn">View full timetable</button>
      </section>

      <section class="later-list card">
        <h3>Later</h3>
        <div id="laterEvents">
          <div style="color:#666">Loading activities...</div>
        </div>
      </section>

      <section class="help-me card">
        <button id="helpMeBtn" class="help-btn">Help Me</button>
      </section>
    </main>

    <nav class="bottom-nav">
      <a class="nav-item active" href="index.html">Today</a>
      <a class="nav-item" href="myweek.html">My Week</a>
      <a class="nav-item" href="index.html">School</a>
      <a class="nav-item" href="travel.html">Travel</a>
      <a class="nav-item" href="helpme.html">Help</a>
    </nav>
  </div>

  <script>
    // Basic prototype script: update date, local-checklist, and ETA countdown.
    (function(){
      const dateLine = document.getElementById('dateLine');
      const now = new Date();
      const opts = { weekday: 'long', month: 'long', day: 'numeric' };
      dateLine.textContent = now.toLocaleDateString(undefined, opts);

      // Child name editable via localStorage
      const childNameEl = document.getElementById('childName');
      const savedName = localStorage.getItem('oneplace_childName');
      if (savedName) childNameEl.textContent = savedName;

      // Micro tasks persistence
      const tasks = document.querySelectorAll('#microTasks input[type=checkbox]');
      tasks.forEach(cb => {
        const key = 'task_' + cb.dataset.task;
        const val = localStorage.getItem(key);
        cb.checked = val === '1';
        cb.addEventListener('change', ()=>{
          localStorage.setItem(key, cb.checked ? '1' : '0');
        });
      });

      // ETA countdown (prototype uses now + 14min default)
      let nextBus = localStorage.getItem('oneplace_nextBus');
      if (!nextBus) {
        nextBus = Date.now() + 14*60*1000; // 14 minutes from now
        localStorage.setItem('oneplace_nextBus', nextBus);
      }
      nextBus = Number(nextBus);

      function updateETA(){
        const etaEl = document.getElementById('eta');
        const diff = nextBus - Date.now();
        if (diff <= 0) {
          etaEl.textContent = 'Bus due now';
          etaEl.classList.add('due');
        } else {
          const mins = Math.floor(diff / 60000);
          const secs = Math.floor((diff % 60000)/1000);
          etaEl.textContent = 'Leave home in ' + mins + 'm ' + (secs<10? '0'+secs:secs) + 's';
        }
      }
      updateETA();
      setInterval(updateETA, 1000);

      document.getElementById('helpMeBtn').addEventListener('click', ()=>{
        const choice = prompt('What do you need right now?\n1) Everything feels too much\n2) I\'m angry\n3) I\'m worried\n4) I don\'t know what to do\n5) I need some quiet', '1');
        if (choice) {
          alert('Logged: ' + choice + '. Your parent will be shown this in the app (prototype).');
          // In real app, this would POST an occurrence.
        }
      });

      document.getElementById('viewTimetable').addEventListener('click', ()=>{
        alert('Timetable view (prototype)');
      });

      // Render parent-added events from localStorage (if any)
      function loadEvents(){
        const raw = localStorage.getItem('oneplace_events');
        try{return raw?JSON.parse(raw):[]}catch(e){return []}
      }
      function renderLater(){
        const container = document.getElementById('laterEvents');
        const events = loadEvents();
        if(!container) return;
        if(events.length===0){ container.innerHTML = '<div class="event"><div class="time">No events</div><div class="meta">No upcoming activities</div></div>'; return; }
        container.innerHTML = '';
        events.forEach(e=>{
          const el = document.createElement('div'); el.className='event';
          const time = document.createElement('div'); time.className='time'; time.textContent = e.time ? e.time : '';
          const meta = document.createElement('div'); meta.className='meta'; meta.textContent = (e.title||'') + (e.location? ' — '+e.location : '');
          el.appendChild(time); el.appendChild(meta);
          container.appendChild(el);
        });
      }
      renderLater();

    })();
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#ffd8e6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="One Place" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.svg" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>One Place — Parent Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .parent-header {
      background: linear-gradient(135deg, #ff69b4 0%, #ffd8e6 100%);
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .parent-header h1 {
      font-size: 24px;
      margin: 0;
    }
    .parent-header .logout-btn {
      background: rgba(255,255,255,0.3);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin: 25px 20px 15px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #ff69b4;
    }
    .add-btn {
      background: #ff69b4;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin: 0 20px 15px;
      transition: transform 0.1s;
    }
    .add-btn:active {
      transform: scale(0.95);
    }
    .event-item {
      background: white;
      margin: 0 20px 12px;
      padding: 16px;
      border-radius: 10px;
      border-left: 4px solid #ff69b4;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .event-info {
      flex: 1;
    }
    .event-info .title {
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }
    .event-info .time {
      font-size: 13px;
      color: #999;
    }
    .delete-btn {
      background: #ffccdd;
      color: #ff69b4;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .messages-card {
      background: #fffbfd;
      margin: 20px;
      padding: 20px;
      border-radius: 15px;
      border: 2px solid #ffdee6;
    }
    .messages-card h3 {
      color: #ff69b4;
      margin-bottom: 15px;
      font-size: 16px;
    }
    .message-item {
      background: white;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      border-left: 3px solid #ff69b4;
    }
    .message-item .feeling {
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }
    .message-item .time {
      font-size: 12px;
      color: #999;
    }
    .message-item .reply-btn {
      background: #ff69b4;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 8px;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: white;
      border-radius: 15px;
      padding: 25px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal-content h2 {
      color: #333;
      margin-bottom: 15px;
      font-size: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      color: #333;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 2px solid #eee;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #ffd8e6;
    }
    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .modal-buttons button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }
    .modal-buttons .save-btn {
      background: #ff69b4;
      color: white;
    }
    .modal-buttons .cancel-btn {
      background: #eee;
      color: #333;
    }
    .empty-state {
      text-align: center;
      color: #999;
      padding: 40px 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="parent-header">
      <h1>Parent Dashboard</h1>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <main>
      <!-- Quick Stats -->
      <div class="section-title">📊 Today's Check-In</div>
      <div id="childStatus" class="card" style="margin: 0 20px 20px; padding: 16px; background: linear-gradient(135deg, #fff0f7 0%, #fffbfd 100%); border-left: 4px solid #ff69b4;">
        <div style="font-weight: 600; color: #333; margin-bottom: 8px;">
          <span id="childStatusName">Jamie</span>'s Status
        </div>
        <div id="lastFeeling" style="font-size: 14px; color: #666;">No check-ins yet</div>
      </div>

      <!-- Messages from Child -->
      <div class="section-title">💬 Messages from Child</div>
      <div id="messagesContainer" class="messages-card">
        <div class="empty-state">No messages yet. Child can send feelings & quick messages from the app.</div>
      </div>

      <!-- Add Event Section -->
      <div class="section-title">📅 Add Activity / Schedule</div>
      <button class="add-btn" id="addEventBtn">+ Add Event for Jamie</button>

      <!-- Events List -->
      <div id="eventsContainer">
        <div class="empty-state" style="padding: 30px 20px;">No events yet. Add one to sync to child's view.</div>
      </div>
    </main>
  </div>

  <!-- Add Event Modal -->
  <div id="addEventModal" class="modal">
    <div class="modal-content">
      <h2>Add Activity for Child</h2>
      <div class="form-group">
        <label for="eventTitle">What's happening?</label>
        <input type="text" id="eventTitle" placeholder="e.g., School pickup, Lunch time" />
      </div>
      <div class="form-group">
        <label for="eventTime">When?</label>
        <input type="time" id="eventTime" />
      </div>
      <div class="form-group">
        <label for="eventLocation">Where?</label>
        <input type="text" id="eventLocation" placeholder="e.g., School, Home" />
      </div>
      <div class="form-group">
        <label for="eventNote">How much detail should Jamie see?</label>
        <textarea id="eventNote" placeholder="Keep it simple & calm. E.g., 'You'll walk to school with mum'"></textarea>
      </div>
      <div class="modal-buttons">
        <button class="cancel-btn" id="cancelEventBtn">Cancel</button>
        <button class="save-btn" id="saveEventBtn">Add to Schedule</button>
      </div>
    </div>
  </div>

  <!-- Reply Modal -->
  <div id="replyModal" class="modal">
    <div class="modal-content">
      <h2>Reply to Jamie</h2>
      <div id="replyContext" style="background: #f5f5f5; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; color: #666;"></div>
      <div class="form-group">
        <label for="replyText">Your message:</label>
        <textarea id="replyText" placeholder="Send Jamie a quick, calm response..."></textarea>
      </div>
      <div class="modal-buttons">
        <button class="cancel-btn" id="cancelReplyBtn">Cancel</button>
        <button class="save-btn" id="sendReplyBtn">Send Message</button>
      </div>
    </div>
  </div>

  <script>
    if (!localStorage.getItem('oneplace_loggedIn') || localStorage.getItem('oneplace_loggedIn') !== 'parent') {
      window.location.href = 'parent-login.html';
    }

    const childName = localStorage.getItem('oneplace_childName') || 'Child';
    document.querySelectorAll('#childStatusName').forEach(el => { el.textContent = childName; });
    document.querySelector('.add-btn').textContent = `+ Add Event for ${childName}`;

    function loadEvents() {
      const raw = localStorage.getItem('oneplace_events');
      try { return raw ? JSON.parse(raw) : []; } catch (e) { return []; }
    }

    function saveEvents(events) {
      localStorage.setItem('oneplace_events', JSON.stringify(events));
      renderEvents();
    }

    function renderEvents() {
      const container = document.getElementById('eventsContainer');
      const events = loadEvents();
      if (events.length === 0) {
        container.innerHTML = '<div class="empty-state" style="padding: 30px 20px;">No events yet. Add one to sync to child\'s view.</div>';
        return;
      }
      container.innerHTML = events.map((e, idx) => `<div class="event-item"><div class="event-info"><div class="title">${e.title}</div><div class="time">${e.time} ${e.location ? '• ' + e.location : ''}</div><div style="font-size: 12px; color: #999; margin-top: 6px;">${e.note}</div></div><button class="delete-btn" onclick="deleteEvent(${idx})">Delete</button></div>`).join('');
    }

    window.deleteEvent = function(idx) {
      const events = loadEvents();
      events.splice(idx, 1);
      saveEvents(events);
    };

    function loadMessages() {
      const raw = localStorage.getItem('oneplace_childMessages');
      try { return raw ? JSON.parse(raw) : []; } catch (e) { return []; }
    }

    function renderMessages() {
      const container = document.getElementById('messagesContainer');
      const messages = loadMessages();
      if (messages.length === 0) {
        container.innerHTML = '<div class="empty-state">No messages yet. Child can send feelings & quick messages from the app.</div>';
        return;
      }
      container.innerHTML = messages.map((m, idx) => `<div class="message-item"><div class="feeling">🎭 ${m.feeling}</div><div style="margin: 8px 0; color: #333;">${m.message}</div><div class="time">${m.timestamp}</div><button class="reply-btn" onclick="openReplyModal(${idx})">Reply Now</button></div>`).join('');
    }

    window.openReplyModal = function(idx) {
      const messages = loadMessages();
      const msg = messages[idx];
      document.getElementById('replyContext').textContent = `"${msg.feeling}" — ${msg.message}`;
      document.getElementById('replyModal').classList.add('active');
      document.getElementById('sendReplyBtn').onclick = () => sendReply(idx);
    };

    function sendReply(idx) {
      const replyText = document.getElementById('replyText').value;
      if (!replyText.trim()) return;
      const replies = JSON.parse(localStorage.getItem('oneplace_parentReplies') || '[]');
      replies.push({ message: replyText, timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
      localStorage.setItem('oneplace_parentReplies', JSON.stringify(replies));
      alert(`Message sent to ${childName}!`);
      document.getElementById('replyText').value = '';
      document.getElementById('replyModal').classList.remove('active');
    }

    document.getElementById('addEventBtn').addEventListener('click', () => {
      document.getElementById('addEventModal').classList.add('active');
    });

    document.getElementById('cancelEventBtn').addEventListener('click', () => {
      document.getElementById('addEventModal').classList.remove('active');
      document.getElementById('eventTitle').value = '';
      document.getElementById('eventTime').value = '';
      document.getElementById('eventLocation').value = '';
      document.getElementById('eventNote').value = '';
    });

    document.getElementById('saveEventBtn').addEventListener('click', () => {
      const title = document.getElementById('eventTitle').value.trim();
      const time = document.getElementById('eventTime').value;
      const location = document.getElementById('eventLocation').value.trim();
      const note = document.getElementById('eventNote').value.trim();
      if (!title || !time) { alert('Please fill in the activity and time'); return; }
      const events = loadEvents();
      events.push({ title, time, location, note });
      saveEvents(events);
      document.getElementById('addEventModal').classList.remove('active');
      document.getElementById('eventTitle').value = '';
      document.getElementById('eventTime').value = '';
      document.getElementById('eventLocation').value = '';
      document.getElementById('eventNote').value = '';
    });

    document.getElementById('cancelReplyBtn').addEventListener('click', () => {
      document.getElementById('replyModal').classList.remove('active');
      document.getElementById('replyText').value = '';
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('oneplace_loggedIn');
      localStorage.removeItem('oneplace_parentEmail');
      window.location.href = 'parent-login.html';
    });

    renderEvents();
    renderMessages();
    setInterval(() => { renderMessages(); }, 1000);
  </script>
</body>
</html>
